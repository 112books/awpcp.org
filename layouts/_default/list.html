{{ define "main" }}
<section class="section">
  <div class="section-inner">
    <h1>{{ .Title }}</h1>
    <p class="section-desc">{{ .Description }}</p>
    <div class="editions-list">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="edition-card" style="text-decoration:none;color:var(--ink);">
        <span class="year">{{ .Title }}</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
